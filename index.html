<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combat Arsenal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:monospace;}
canvas{display:block;}

/* SETTINGS BUTTON */
#settings-btn{
position:fixed;top:10px;right:10px;
z-index:999;
background:#111;border:1px solid #333;
padding:8px 10px;cursor:pointer;color:#fff;
}

/* SETTINGS PANEL */
#settings-menu{
position:fixed;top:0;right:-260px;
width:260px;height:100%;
background:#0a0a0a;color:#fff;
z-index:999;
transition:.3s;padding:20px;
}

/* MOBILE FIX BUTTON */
#btn-jump{bottom:200px;left:170px;}
#btn-slide{bottom:200px;left:238px;} /* FIX */
#btn-crouch{bottom:110px;left:306px;} /* FIX */

/* Z-INDEX FIX */
#look-zone{z-index:1;}
#btn-fire,#btn-aim,#btn-reload,#btn-flash,
#btn-jump,#btn-sprint,#btn-crouch,#btn-slide{
z-index:2;
}

/* FIRE FIX */
#btn-fire{touch-action:manipulation;}
</style>
</head>

<body>

<div id="settings-btn">⚙️</div>

<div id="settings-menu">
<h3 style="color:#ff4400;">SETTINGS</h3>

<div>Camera Sensitivity</div>
<input id="sens" type="range" min="0.0005" max="0.004" step="0.0001">

<div style="margin-top:20px">Graphics</div>
<select id="gfx">
<option value="low">Low</option>
<option value="med">Medium</option>
<option value="high">High</option>
</select>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ================= BASIC SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ab0c8);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,200);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.2)); // FIX
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.6));

// GROUND
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(200,200),
 new THREE.MeshBasicMaterial({color:0x3d5c28})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// PLAYER
let yaw=0,pitch=0;
let sens = localStorage.getItem("sens") || 0.002;

// SETTINGS UI
const btn = document.getElementById("settings-btn");
const menu = document.getElementById("settings-menu");

let open=false;
btn.onclick=()=>{
open=!open;
menu.style.right=open?"0":"-260px";
};

const sensSlider=document.getElementById("sens");
sensSlider.value=sens;

sensSlider.oninput=e=>{
sens=parseFloat(e.target.value);
localStorage.setItem("sens",sens);
};

// GRAPHICS
const gfx=document.getElementById("gfx");
gfx.value=localStorage.getItem("gfx")||"high";

gfx.onchange=()=>{
localStorage.setItem("gfx",gfx.value);

if(gfx.value==="low"){
renderer.setPixelRatio(0.6);
}
if(gfx.value==="med"){
renderer.setPixelRatio(1);
}
if(gfx.value==="high"){
renderer.setPixelRatio(Math.min(devicePixelRatio,1.2));
}
};

// MOUSE LOOK
let mouseDX=0,mouseDY=0;
addEventListener("mousemove",e=>{
mouseDX+=e.movementX;
mouseDY+=e.movementY;
});

function update(){
yaw -= mouseDX * sens;
pitch -= mouseDY * sens;
mouseDX=mouseDY=0;

pitch=Math.max(-1.5,Math.min(1.5,pitch));

camera.rotation.order="YXZ";
camera.rotation.y=yaw;
camera.rotation.x=pitch;
}

// LOOP
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
animate();

onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};
</script>

</body>
</html>
